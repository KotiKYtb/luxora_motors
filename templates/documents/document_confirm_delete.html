{% extends "documents/base_documents.html" %}
{% block title %}Supprimer le document{% endblock %}

{% block content %}
  <div class="cms-page-header">
    <h1 class="cms-page-title">Supprimer ce document ?</h1>
  </div>

  <div class="cms-confirm-box">
    <p><strong>{{ document.libelle }}</strong> — {{ vehicule.titre }}</p>
    <p class="cms-confirm-warning">Cette action est définitive.</p>

    <form method="post" class="cms-form-actions">
      {% csrf_token %}
      <button type="submit" class="cms-btn cms-btn-danger">Supprimer</button>
      <a href="{% url 'cms_document_list' vehicule.pk %}" class="cms-btn cms-btn-outline">Annuler</a>
    </form>
  </div>
{% endblock %}
